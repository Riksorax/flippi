app-id: io.github.frankspeu.flippi
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: flippi

finish-args:
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --filesystem=/tmp

modules:
  - name: wl-clipboard
    buildsystem: meson
    config-opts:
      - -Dzshcompletiondir=no
      - -Dfishcompletiondir=no
    sources:
      - type: archive
        url: https://github.com/bugaevc/wl-clipboard/archive/refs/tags/v2.2.1.tar.gz
        sha256: 6eb8081207fb5581d1d82c4bcd9587205a31a3d47bea3ebeb7f41aa1143783eb

  - name: keybinder-3.0
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/kupferlauncher/keybinder/releases/download/keybinder-3.0-v0.3.2/keybinder-3.0-0.3.2.tar.gz
        sha256: e6e3de4e1f3b201814a956ab8f16dfc8a262db1937ff1eee4d855365398c6020

  - name: flippi
    buildsystem: simple
    build-commands:
      - mkdir -p /app/flippi /app/bin
      - cp flippi /app/flippi/flippi
      - chmod +x /app/flippi/flippi
      - cp -r lib /app/flippi/lib
      - cp -r data /app/flippi/data
      - printf '#!/bin/sh\ncd /app/flippi && exec ./flippi "$@"\n' > /app/bin/flippi
      - chmod +x /app/bin/flippi
      - install -Dm644 io.github.frankspeu.flippi.desktop /app/share/applications/io.github.frankspeu.flippi.desktop
      - install -Dm644 io.github.frankspeu.flippi.appdata.xml /app/share/metainfo/io.github.frankspeu.flippi.appdata.xml
      - install -Dm644 icons/128x128/io.github.frankspeu.flippi.png /app/share/icons/hicolor/128x128/apps/io.github.frankspeu.flippi.png
      - install -Dm644 icons/256x256/io.github.frankspeu.flippi.png /app/share/icons/hicolor/256x256/apps/io.github.frankspeu.flippi.png
      - install -Dm644 icons/512x512/io.github.frankspeu.flippi.png /app/share/icons/hicolor/512x512/apps/io.github.frankspeu.flippi.png
    sources:
      - type: dir
        path: ../build/linux/x64/release/bundle
      - type: file
        path: io.github.frankspeu.flippi.desktop
      - type: file
        path: io.github.frankspeu.flippi.appdata.xml
      - type: dir
        path: icons
        dest: icons
